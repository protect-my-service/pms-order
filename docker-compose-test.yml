version: '3.8'
services:
  postgres-test:
    image: postgres:15
    environment:
      POSTGRES_DB: pms_order_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "15432:5432"
    tmpfs:
      - /var/lib/postgresql/data

  rabbitmq-test:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "25672:5672"
      - "35672:15672"
